on:
  workflow_call:
    inputs:
      push:
        required: false
        type: boolean
      tags:
        required: false
        type: string

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - if: ${{ inputs.push && inputs.tags != '' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ inputs.push && inputs.tags != '' }}
          tags: ${{ inputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max