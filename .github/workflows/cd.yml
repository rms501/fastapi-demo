on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  validate:
    uses: ./.github/workflows/validate.yml

  build:
    uses: ./.github/workflows/build.yml
    with:
      push: true
      tags: ghcr.io/rms501/fastapi-demo:latest

  migrate:
    needs:
      - validate
      - build
    name: Migrate SQL schema to Render
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/setup-python-uv
        with:
          version: "3.13"

      - name: Migrate SQL
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: uv run alembic upgrade head

  deploy:
    needs: migrate
    name: Deploy to Render
    runs-on: ubuntu-latest

    steps:
      - name: Deploy app
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}