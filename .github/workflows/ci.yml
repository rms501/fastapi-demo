on:
  workflow_dispatch:
  pull_request:
    branches:
      - main

jobs:
  validate:
    uses: ./.github/workflows/validate.yml

  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max